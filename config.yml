services:
  postgres:
    image: postgres:alpine
    container_name: stock-cache-postgres
    environment:
      POSTGRES_DB: stock_cache
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stock_cache"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    volumes:
      - ./.runtime/pgsql:/var/lib/postgresql
